name: Build Kernel Modules for NX1

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y build-essential flex bison bc git wget

    - name: Clone Android Common Kernel
      run: |
        git clone --depth=1 -b android15-6.6 https://android.googlesource.com/kernel/common.git
        cd common

    - name: Prepare kernel config
      run: |
        cd common
        # 1. 用你上传的 config 文件作为初始配置
        cp ../config arch/arm64/configs/nx1_defconfig
        make ARCH=arm64 nx1_defconfig

        # 2. 用 scripts/config 工具修改配置，这是内核源码的官方方法
        ./scripts/config --enable CONFIG_USER_NS
        ./scripts/config --enable CONFIG_PID_NS

        # 3. 手动同步配置，生成新的 autoconf.h，完全不需要指定额外工具链
        make ARCH=arm64 syncconfig

        # 4. 检查修改是否成功
        grep -E 'CONFIG_USER_NS|CONFIG_PID_NS' .config

    - name: Build modules
      run: |
        cd common
        # 使用 Clang + LLD 编译真正的 ARM64 内核模块
        make ARCH=arm64 CC=clang LD=ld.lld LLVM=1 -j$(nproc) modules_prepare
        make ARCH=arm64 CC=clang M=kernel -j$(nproc)
        mkdir -p ../output
        cp kernel/user_namespace.ko ../output/ 2>/dev/null || echo "Warning: user_namespace.ko not found"
        cp kernel/pid_namespace.ko ../output/ 2>/dev/null || echo "Warning: pid_namespace.ko not found"
        ls -la ../output/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nx1-kernel-modules
        path: output/
