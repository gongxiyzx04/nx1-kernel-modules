name: Build Kernel Modules for NX1

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install build dependencies and toolchain
      run: |
        sudo apt-get update -y
        sudo apt-get install -y build-essential flex bison bc git wget clang lld gcc-aarch64-linux-gnu

    - name: Clone Android Common Kernel
      run: |
        # GitHub Actions 的服务器访问谷歌源非常快
        git clone --depth=1 -b android15-6.6 https://android.googlesource.com/kernel/common.git
        cd common

    - name: Prepare kernel config
      run: |
        cd common
        cp ../config arch/arm64/configs/nx1_defconfig
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- nx1_defconfig
        ./scripts/config --enable CONFIG_USER_NS
        ./scripts/config --enable CONFIG_PID_NS

    - name: Build modules
      run: |
        cd common
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- LD=ld.lld LLVM=1 -j$(nproc) olddefconfig modules_prepare
        make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- M=kernel -j$(nproc)
        mkdir -p ../output
        cp kernel/user_namespace.ko ../output/ 2>/dev/null || echo "Warning: user_namespace.ko not found"
        cp kernel/pid_namespace.ko ../output/ 2>/dev/null || echo "Warning: pid_namespace.ko not found"
        ls -la ../output/

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nx1-kernel-modules
        path: output/
